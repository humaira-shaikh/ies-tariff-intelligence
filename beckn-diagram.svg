<svg width="740" height="420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="740" height="420" fill="#f0f4f8" rx="12"/>

  <!-- Title -->
  <text x="370" y="34" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold">Beckn Protocol — Tariff Discovery Flow</text>

  <!-- ── SERC Box ── -->
  <rect x="30" y="60" width="200" height="100" rx="10" fill="#1a73e8" stroke="#1255c0" stroke-width="2"/>
  <text x="130" y="92" text-anchor="middle" fill="white" font-size="15" font-weight="bold">SERC</text>
  <text x="130" y="113" text-anchor="middle" fill="#ccdeff" font-size="12">(Regulator)</text>
  <rect x="60" y="126" width="140" height="24" rx="5" fill="#0d47a1" opacity="0.7"/>
  <text x="130" y="143" text-anchor="middle" fill="#90caff" font-size="11" font-weight="bold">via BPP</text>

  <!-- ── Arrow ── -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#444"/>
    </marker>
  </defs>

  <!-- Arrow line -->
  <line x1="234" y1="110" x2="506" y2="110" stroke="#444" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Arrow labels -->
  <text x="370" y="99" text-anchor="middle" fill="#2d2d2d" font-size="11" font-style="italic">publishes tariff</text>
  <text x="370" y="127" text-anchor="middle" fill="#2d2d2d" font-size="11" font-style="italic">discovers &amp; fetches tariff</text>

  <!-- ── DISCOM Box ── -->
  <rect x="510" y="60" width="200" height="100" rx="10" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="610" y="88" text-anchor="middle" fill="white" font-size="14" font-weight="bold">DISCOM /</text>
  <text x="610" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Consumer App</text>
  <rect x="530" y="122" width="160" height="26" rx="5" fill="#1b5e20" opacity="0.7"/>
  <text x="610" y="140" text-anchor="middle" fill="#a5d6a7" font-size="10.5" font-weight="bold">via BAP + Beckn Protocol</text>

  <!-- ── Dashed lines to Registry ── -->
  <!-- SERC → Registry -->
  <line x1="130" y1="162" x2="130" y2="298" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="130" y1="298" x2="308" y2="298" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- DISCOM → Registry -->
  <line x1="610" y1="162" x2="610" y2="298" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="610" y1="298" x2="432" y2="298" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Arrows pointing into registry box -->
  <polygon points="312,294 300,298 312,302" fill="#888"/>
  <polygon points="428,294 440,298 428,302" fill="#888"/>

  <!-- ── DeDi Registry Box ── -->
  <rect x="270" y="268" width="200" height="80" rx="10" fill="#e65100" stroke="#bf360c" stroke-width="2"/>
  <text x="370" y="298" text-anchor="middle" fill="white" font-size="14" font-weight="bold">DeDi Registry</text>
  <text x="370" y="318" text-anchor="middle" fill="#ffe0b2" font-size="12">(nfh.global)</text>
  <text x="370" y="340" text-anchor="middle" fill="#ffcc80" font-size="10.5" font-style="italic">knows who is on the network</text>

  <!-- ── Legend ── -->
  <line x1="30" y1="390" x2="60" y2="390" stroke="#444" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="68" y="395" fill="#444" font-size="11">Tariff flow</text>
  <line x1="160" y1="390" x2="190" y2="390" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="198" y="395" fill="#666" font-size="11">Registry lookup</text>

</svg>
